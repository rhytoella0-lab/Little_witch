async function unlockAudio() {
  
  if (audioUnlocked) return;
  
  try {
    
    stageMusic.muted = true;
    
    await stageMusic.play();
    
    stageMusic.pause();
    
    stageMusic.currentTime = 0;
    
    stageMusic.muted = false;
    
    audioUnlocked = true;
    
  } catch (err) {
    
    console.log(err);
    
  }
  
}

async function action() {
  
  //console.log("action開始");
  
  
  if (inputLocked) {
    //console.log("inputLocked");
    return;
  }
  
  
  unlockAudio();
  
  //console.log("unlockAudio呼び出し");
  
  
  startBGM();
  
  //console.log("BGM呼び出し");
  
  
  if (gameOver && !cleared) {
    init();
    return;
  }
  
  
  if (player.jump < 3) {
    
    player.dy = -12;
    player.jump++;
    
    //console.log(
      //"ジャンプ実行",
      //player.dy,
      //player.jump
    //);
    
  }
  
}

// =====================================
// ランプ接近判定
// =====================================
function isNearLamp() {
  
  const dx =
    (playerWalk.x + playerWalk.width / 2 + 40) -
    (lamp.x + lamp.width / 2);
  
  const dy =
    (playerWalk.y + playerWalk.height / 2) -
    (lamp.y + lamp.height / 2);
  
  const distance = Math.sqrt(
    dx * dx + dy * dy
  );
  
  return distance < lampInteractDistance;
}

function isNearKey(){

  const dx =
    (playerWalk.x + playerWalk.width / 2)
    -
    (key.x + key.width / 2);


  const dy =
    (playerWalk.y + playerWalk.height / 2)
    -
    (key.y + key.height / 2);


  const distance =
    Math.sqrt(dx*dx + dy*dy);


  return (
  key.arrived &&
  key.visible &&
  !key.taken &&
  distance < 70
);

}

function isNearDoor(){

  const dx =
    (playerWalk.x + playerWalk.width / 2)
    -
    (door.x + door.width / 2 - 50);


  const dy =
    (playerWalk.y + playerWalk.height / 2)
    -
    (door.y + door.height / 2);


  const distance =
    Math.sqrt(dx*dx + dy*dy);


  return distance < 60;

}

function getPlayerImg() {
  
// ステージ2入口へ歩く時だけ通常画像
if (enteringStage2 && !stage2) {
  
  return walkRightImgs[walkIndex];
  
} 
  
  // ステージ2
  if (stage2) {
    
    // ランプOFF（暗闇）
    if (!stage2Light) {
      
      if (playerWalk.moveDirection > 0) {
        return whiteWalkRightImgs[walkIndex];
      }
      
      if (playerWalk.moveDirection < 0) {
        return whiteWalkLeftImgs[walkIndex];
      }
      
      return facingRight ?
  whiteIdleRightImg :
  whiteIdleLeftImg;
      
    }
    
    
    // ランプON
    else {
      
      if (playerWalk.moveDirection > 0) {
        return walkRightImgs[walkIndex];
      }
      
      if (playerWalk.moveDirection < 0) {
        return walkLeftImgs[walkIndex];
      }
      
      return facingRight ?
  idleRightImg :
  idleLeftImg;
      
    }
    
  }
  
  
  // ステージ1ジャンプ
if (player.jump > 0) {
  
  // ステージ2
  if (stage2) {
    
    // 暗闇
    if (!stage2Light) {
      
      return player.dy < 0 ?
        playerWhiteUpImg :
        playerWhiteDownImg;
      
    }
    
    // ランプ点灯後
    else {
      
      return player.dy < 0 ?
        playerStage2UpImg :
        playerStage2DownImg;
      
    }
    
  }
  
  
  // ステージ1
  return player.dy < 0 ?
    playerUpImg :
    playerDownImg;
  
}
  
  
  return playerImgs[frameIndex];
  
}

clearSe.play()
  .catch(err => {

   // console.log("SE再生失敗:", err);

  });


}

}
 

// =====================================
// 更新
// =====================================
function update(){

  if(gameOver && !cleared){
    return;
  }

// --------------------------
// 暗転処理
// --------------------------

if(fading){

  if(fadeMode==="toBlack"){

    fadeAlpha += 0.03;


    if (fadeAlpha >= 1) {
  
  fadeAlpha = 1;
  
  // ----------------------
  // Stage2へ行く暗転
  // ----------------------
  if (fadeTarget === "stage2") {
    
    fadeMode = "fromBlack";
    
    stage2 = true;
    enteringStage2 = false;
    
    stage2Light = false;
    lamp.on = false;
    
    ghost.state = "idle";
    ghost.frame = 0;
    ghost.animTimer = 0;
    
    playerWalk.x = stage2StartX;
    playerWalk.y = stage2StartY;
    
    stage2Intro = true;
    
    playerWalk.moveDirection = 1;
    walkIndex = 0;
  }
  
  // ----------------------
  // Stage3へ行く暗転
  // ----------------------
  else if (fadeTarget === "stage3") {
    
    startStage3();
    
    fadeMode = "fromBlack";
  }
  
}

  }


  else if (fadeMode === "fromBlack") {
  
  
  fadeAlpha -= 0.03;
  
  
  if (fadeAlpha <= 0) {
  
  fadeAlpha = 0;
  
  stageTransition = false;
  
  fading = false;
  
}
  
}

}

// --------------------------
// Stage3開始タイマー
// --------------------------

if (waitingStage3Start) {
  
  stage3WaitTimer += 1000 / 60;
  
  if (stage3WaitTimer >= 1000) {
    
    waitingStage3Start = false;
    
    fading = true;
    fadeMode = "toBlack";
    fadeTarget = "stage3";
    
  }
  
}

  // --------------------------
  // プレイヤーフレーム5FPS
  // --------------------------
  const now = Date.now();

  if (now - lastFrameTime > 1000 / 5) {
  
  frameIndex++;
  
  if (frameIndex >= playerImgs.length) {
    frameIndex = 0;
  }
  
  
 if (enteringStage2 || stageTransition) {
  
  walkIndex++;
  
  if (walkIndex >= walkRightImgs.length) {
    walkIndex = 0;
  }
  
}
else if (stage2 && playerWalk.moveDirection !== 0) {
  
  walkIndex++;
  
  if (walkIndex >= walkRightImgs.length) {
    walkIndex = 0;
  }
  
}
  
  
  lastFrameTime = now;
}

  // --------------------------
  // 浮遊
  // --------------------------
  floatTimer += 0.1;


// --------------------------
// 入口へ歩く
// --------------------------
if (enteringStage2 || stageTransition) {
  
  playerWalk.x += 0.6;
  
  //console.log(
//  "本当に歩行中",
  //playerWalk.x,
  //playerWalk.y,
  //walkIndex
//);
  
  //console.log("歩行位置", playerWalk.x);
  
  if (playerWalk.x >= entranceX - 100 && !fading) {
  
  fading = true;
  stageTransition = true;
  fadeMode = "toBlack";
  
  fadeTarget = "stage2";
  
  stage2Started = true;
  
  
  // ステージ2位置変更はここではしない
  
  
  walkIndex = 0;
  lastFrameTime = Date.now();
  
  
  stage2Intro = false;
  playerWalk.moveDirection = 0;
}
  
}

if (stage2) {
  
  // お化け浮遊
ghost.float += 0.05;

ghost.y =
  ghost.waitY + Math.sin(ghost.float) * 5;
  
  if (key.visible && !key.taken) {
  
  key.y = ghost.y;
  
}
  // --------------------------
  // ステージ2開始演出
  // --------------------------
  if (stage2Intro) {
  
  playerWalk.moveDirection = 1;
  
  let speed = playerWalk.moveDirection * 1.5;
  let nextX = playerWalk.x + speed;
  
  playerWalk.x = nextX;
  
  if (playerWalk.x >= 70) {
    
    playerWalk.x = 70;
    playerWalk.moveDirection = 0;
    stage2Intro = false;
    
  }
  
} else if (!door.playerEntering && !door.waitingStage3) {
  
  let speed = playerWalk.moveDirection * 1.5;
  
  let nextX = playerWalk.x + speed;
    
    // 左右の限界
    if (nextX < 0) {
      
      playerWalk.x = 0;
      playerWalk.moveDirection = 0;
      
    }
    else if (nextX > BASE_WIDTH - playerWalk.width) {
      
      playerWalk.x =
        BASE_WIDTH - playerWalk.width;
      
      playerWalk.moveDirection = 0;
      
    }
    else {
      
      playerWalk.x = nextX;
      
    }
    
  }
  
  // ステージ2ジャンプ処理
  
  // 横ジャンプ移動
  playerWalk.x += playerWalk.dx;
  
  if (playerWalk.x < 0) {
    
    playerWalk.x = 0;
    
  }
  
  if (playerWalk.x > BASE_WIDTH - playerWalk.width) {
    
    playerWalk.x = BASE_WIDTH - playerWalk.width;
    
  }
  
  // 空中減速
  playerWalk.dx *= 0.9;
  
  // 縦移動
  playerWalk.y += playerWalk.dy;
  
  playerWalk.dy += gravity;
  
  if (playerWalk.y > stage2StartY) {
    
    playerWalk.y = stage2StartY;
    
    playerWalk.dy = 0;
    
    playerWalk.dx = 0;
    
    playerWalk.jump = 0;
    
  }
  
}

  // --------------------------
  // プレイヤー
  // --------------------------
  player.y += player.dy;

  player.dy += gravity;

  if(player.y > 135){

    player.y = 135;

    player.dy = 0;

    player.jump = 0;
  }

  // --------------------------
  // 敵
  // --------------------------
const playerLine = player.x + 20;

obstacles.forEach(o => {
  
  o.x -= 5;
  
  if (!o.passed && o.x + o.width < playerLine) {
    o.passed = true;
    
    if (player.y < 135) {
      score++;
    }
  }
});
  obstacles =
    obstacles.filter(o=>o.x + o.width > 0);

  // --------------------------
  // 敵生成
  // --------------------------
  if(!cleared){

    if(Math.random() < 0.02){

      if(obstacles.length < 8){

        spawnObstacle();
      }
    }
  }

 // --------------------------
  // 当たり判定
  // --------------------------
  if (!cleared) {
    
    obstacles.forEach(o => {
      
      // ジャンプ中だけ判定
      if (player.jump > 0) {
        
        // プレイヤー判定
        const playerHitbox = {
          
          x: player.x + 20,
          y: player.y + 12,
          
          width: player.width - 40,
          height: player.height - 24
        };
        
        // 敵判定
        const enemyHitbox = {
          
          x: o.x + 8,
          y: o.y + 8,
          
          width: o.width - 16,
          height: o.height - 16
        };
        
        // 四角判定
        if (
          
          playerHitbox.x <
          enemyHitbox.x + enemyHitbox.width
          
          &&
          
          playerHitbox.x + playerHitbox.width >
          enemyHitbox.x
          
          &&
          
          playerHitbox.y <
          enemyHitbox.y + enemyHitbox.height
          
          &&
          
          playerHitbox.y + playerHitbox.height >
          enemyHitbox.y
          
        ) {
          
          gameOver = true;
        }
      }
    });
  }
  // --------------------------
  // 背景
  // --------------------------
  if (!stage2) {
  updateBackground();
}

// --------------------------
// お化け・鍵イベント
// --------------------------
if (stage2) {
 
// ----------------------
// 扉アニメーション
// ----------------------

if (stage2 && door.opening) {
  
  door.frameTimer++;
  
  
  if (door.frameTimer % 12 === 0) {
    
    door.frame++;
    
    
    if (door.frame >= doorOpenFrames.length) {
      
      door.opening = false;
      door.open = true;
      
      door.frame =
        doorOpenFrames.length - 1;
      
      
      door.playerEntering = true;
      
    }
    
  }
} 
  
  // ----------------------
// idleアニメーション
// ----------------------

if (ghost.state === "idle") {
  
  ghost.animTimer += 1000 / 60;
  
  
  if (ghost.animTimer >= 200) {
    
    ghost.frame++;
    
    ghost.animTimer = 0;
    
    
    if (
      ghost.frame >= ghostIdleImgs.length
    ) {
      
      ghost.frame = 0;
      
    }
    
  }
  
}
  // ----------------------
  // ランプON
  // ----------------------
  if (
  lamp.on &&
  ghost.state === "idle" &&
  !keyDelivered
) {
  
  ghost.state = "goRight";
  
  ghost.frame = 0;
  
  ghost.timer = 0;
  
}
  
  
  
  // ----------------------
  // 右へ消える
  // ----------------------
 if (ghost.state === "goRight") {
  
  ghost.x += ghost.speed;
  
  
  ghost.animTimer += 1000 / 60;
  
  
  if (ghost.animTimer >= 200) {
    
    ghost.frame++;
    ghost.animTimer = 0;
    
    
    if (ghost.frame >= ghostWalkRightImgs.length) {
      
      ghost.frame = 0;
      
    }
    
  }
    
    
    
    if (ghost.x > BASE_WIDTH + 100) {
      
      
      ghost.state = "returnKey";
      
      ghost.x = BASE_WIDTH + 100;
      
      ghost.frame = 0;
      
      ghost.timer = 0;
      
      
      key.x = ghost.x;
key.y = ghost.y;
      
      key.visible = true;
      
    }
    
    
  }
  
  // ----------------------
  // 鍵を持って左へ戻る
  // ----------------------
  if (ghost.state === "returnKey") {
    
    
    ghost.x -= ghost.speed;
    
  ghost.animTimer += 1000 / 60;


if (ghost.animTimer >= 200) {
  
  ghost.frame++;
  ghost.animTimer = 0;
  
  
  if (ghost.frame >= ghostWalkLeftKeyImgs.length) {
    
    ghost.frame = 0;
    
  }
  
}
    
    // 鍵はお化けと同じ位置
   key.x = ghost.x;
   key.y = ghost.y;
    
    
    
    if (ghost.x <= ghost.waitX) {
  
  ghost.x -= (ghost.x - ghost.waitX) * 0.2;
  
  if (Math.abs(ghost.x - ghost.waitX) < 0.5) {
    
    ghost.x = ghost.waitX;
    ghost.y = ghost.waitY;
    
    key.x = ghost.x;
    key.y = ghost.y;
    
    key.visible = true;
    
    key.arrived = true;
    
    keyDelivered = true;

ghost.state = "waitKey";

ghost.frame = 0;
ghost.timer = 0;
    
  }
  
}
    
    
  }
  // ----------------------
  // 待機
  // ----------------------
  
if (ghost.state === "waitKey") {
  
  ghost.x = ghost.waitX;
  
  // ふよふよ維持
  ghost.y =
    ghost.waitY + Math.sin(ghost.float) * 5;
  
  
  // 鍵も一緒に動く
  key.x = ghost.x;
  key.y = ghost.y;
  
  
  // idleアニメ
ghost.animTimer += 1000 / 60;


if (ghost.animTimer >= 200) {
  
  ghost.frame++;
  
  ghost.animTimer = 0;
  
  
  if (ghost.frame >= ghostIdleImgs.length) {
    
    ghost.frame = 0;
    
  }
  
}
  
}
  
} 
if (stage2 && door.playerEntering) {
  
  playerWalk.moveDirection = 1;
  
  playerWalk.x += 0.4;
  
  
  if (playerWalk.x > door.x + 40) {
  
  playerWalk.moveDirection = 0;
  
  door.playerEntering = false;
  door.waitingStage3 = true;
  
  
  
}
  
}
if (stage2 && door.waitingStage3) {
  
  playerWalk.moveDirection = -1;
  
  playerWalk.x -= 0.4;
  
  
  // 左へ戻る距離
  if (playerWalk.x <= door.x + 30) {
    
    playerWalk.moveDirection = 0;
    
    door.waitingStage3 = false;
    
    inputLocked = true;
    
    
    waitingStage3Start = true;
    
    stage3WaitTimer = 0;
    
  }
  
}


if (waitingStage3Start) {
  
  stage3WaitTimer++;
  
  
  // 約2秒待つ
  if (stage3WaitTimer >= 120) {
    
    waitingStage3Start = false;
    
    startStage3();
    
  }
  
}
if (keyEffect.playing) {
  
  keyEffect.timer += 1000 / 60;
  
  if (keyEffect.timer >= 200) {
    
    keyEffect.frame++;
    
    keyEffect.timer = 0;
    
    if (keyEffect.frame >= keyEffectImgs.length) {
      
      keyEffect.playing = false;
      
      keyEffect.frame = 0;
      
    }
    
  }
  
}
}

// =====================================
// 描画
// =====================================
function draw(){

  const scale =
    canvas.width / BASE_WIDTH;

  ctx.setTransform(
    scale,
    0,
    0,
    scale,
    0,
    0
  );

  ctx.clearRect(
    0,
    0,
    BASE_WIDTH,
    BASE_HEIGHT
  );

  // --------------------------
  // 背景
  // --------------------------
  if (!stage2) {
  
  if (bgStatic.complete) {
    
    ctx.drawImage(
      bgStatic,
      0,
      0,
      BASE_WIDTH,
      BASE_HEIGHT
    );
    
  }
  
} else {
  
  // ランプ点灯時は明るい背景
  if (stage2Light) {
    
    if (stage2BgLight.complete) {
      
      ctx.drawImage(
        stage2BgLight,
        0,
        0,
        BASE_WIDTH,
        BASE_HEIGHT
      );
      
    }
    
  }
  
  // ランプ消灯時は暗い背景
  else {
    
    if (stage2Bg.complete) {
      
      ctx.drawImage(
        stage2Bg,
        0,
        0,
        BASE_WIDTH,
        BASE_HEIGHT
      );
      
    }
    
  }
  
}


  if (!stage2 && bgMove1.complete && bgMove2.complete) {
  
  ctx.drawImage(
    bgMove1,
    bgOffset,
    0,
    BASE_WIDTH,
    BASE_HEIGHT
  );
  
  ctx.drawImage(
    bgMove2,
    bgOffset + BASE_WIDTH,
    0,
    BASE_WIDTH,
    BASE_HEIGHT
  );
  
}


// --------------------------
// 扉描画
// --------------------------

if (stage2) {
  
  let img;
  
  
  if (door.opening) {
  
  img =
    doorOpenFrames[door.frame];
  
}

else if (door.open) {
  
  img = doorOpenImg;
  
}
  
  else if (isNearDoor()) {
    
    img = doorNearImg;
    
  }
  
  else {
    
    img = doorClosedImg;
    
  }
  
  
  ctx.drawImage(
    img,
    door.x,
    door.y,
    door.width,
    door.height
  );
  
}

// --------------------------
// ランプ描画
// --------------------------
if (stage2) {
  
  let img;
  
  if (lamp.on) {
    img = lampOnImg;
  }
 else if (isNearLamp()) {
  img = lampNearImg;
}
  else {
    img = lampHintImg;
  }
  
  
  ctx.drawImage(
    img,
    lamp.x,
    lamp.y,
    lamp.width,
    lamp.height
  );
  
}
// --------------------------
// プレイヤー
// --------------------------
const floatOffset =
  Math.sin(floatTimer) * 3;

if (!animating) {
  
  const drawPlayer =
    (enteringStage2 || stage2) ? playerWalk : player;
  
  
  const img = getPlayerImg();
  
  
  const ratio =
    img.height / img.width;
  
  
  const drawW =
  enteringStage2 ?
  drawPlayer.width * 1.2 :
  stage2 ?
  drawPlayer.width * 1.5 :
  drawPlayer.width;
  
  
  const drawH =
    drawW * ratio;
  
  
  let drawY;
  
  
  if (enteringStage2) {
  
  drawY =
    drawPlayer.y - (drawH - drawPlayer.height);
  
}
else if (stage2) {
  
  drawY =
    drawPlayer.y - (drawH - drawPlayer.height) + 12;
  
}
else {
  
  drawY =
    drawPlayer.y + floatOffset - (drawH - player.height);
  
}
  
  
  ctx.drawImage(
    img,
    drawPlayer.x,
    drawY,
    drawW,
    drawH
  );
  
}
else {
  
  animTimer++;
  
  if (animTimer % 12 === 0) {
    
    animFrame++;
    
    // Fly終了
    if (animFrame >= flyFrames.length) {
      
      animFrame = flyFrames.length - 1;
      
      playerWalk.x = player.x + flyOffsets[flyFrames.length - 1].x;
playerWalk.y = player.y + flyOffsets[flyFrames.length - 1].y;
      
      walkIndex = 0;
      
      animating = false;
      
      enteringStage2 = true;
      
      inputLocked = false;
      
      //console.log("★入口へ歩行開始", playerWalk.x);
      
    }
    
  }
  
  const img = flyFrames[animFrame];
  
  const off = flyOffsets[animFrame];
  
  const ratio =
    img.height / img.width;
  
  const drawW =
    player.width * 1.2;
  
  const drawH =
    drawW * ratio;
  
  
  ctx.drawImage(
    img,
    player.x + off.x,
    player.y + off.y - (drawH - player.height),
    drawW,
    drawH
  );
  
}

// --------------------------
//敵描画
// --------------------------

obstacles.forEach(o => {
  
  ctx.drawImage(
    o.img,
    o.x,
    o.y,
    o.width,
    o.height
  );
  
});
// --------------------------
// お化け描画
// --------------------------

if (stage2) {
  
  //console.log(
  //"Ghost表示",
  //"stage2Light:", stage2Light,
  //"ghost.state:", ghost.state,
  //"frame:", ghost.frame,
  //"x:", ghost.x,
  //"y:", ghost.y
//);
  
  // 暗い時だけお化け表示
  if (!stage2Light) {
    
    if (ghost.state === "idle") {
  
  ctx.drawImage(
    ghostIdleImgs[ghost.frame],
    ghost.x,
    ghost.y,
    ghost.width,
    ghost.height
  );
  
}
    
    
    if (ghost.state === "goRight") {
      
      ctx.drawImage(
        ghostWalkRightImgs[ghost.frame],
        ghost.x,
        ghost.y,
        ghost.width,
        ghost.height
      );
      
    }
    
    
    if (
      ghost.state === "returnKey" ||
      ghost.state === "waitKey"
    ) {
      
      ctx.drawImage(
        ghostWalkLeftKeyImgs[ghost.frame],
        ghost.x,
        ghost.y,
        ghost.width,
        ghost.height
      );
      
    }
    
  }
  
}

// --------------------------
// 鍵描画
// --------------------------
if (stage2 && key.visible && !key.taken) {
  
  let img;
  
  
  if (isNearKey()) {
    
    img = keyNearImg;
    
  }
  else {
    
    img = keyImg;
    
  }
  
  
  ctx.drawImage(
    img,
    key.x,
    key.y,
    key.width,
    key.height
  );
  
}
if (keyEffect.playing) {
  
  ctx.drawImage(
    keyEffectImgs[keyEffect.frame],
    keyEffect.x,
    keyEffect.y,
    key.width,
    key.height
  );
  
}
ctx.fillStyle = "black";
ctx.font = "20px sans-serif";

// --------------------------
// 暗転描画
// --------------------------

if(fadeAlpha > 0){

  ctx.fillStyle =
    "rgba(0,0,0," + fadeAlpha + ")";


  ctx.fillRect(
    0,
    0,
    BASE_WIDTH,
    BASE_HEIGHT
  );

}


ctx.fillText(
  "Score: " + score,
  650,
  20
);

}




// =====================================
// ループ
// =====================================
function loop(){

  update();

  draw();

  requestAnimationFrame(loop);
}

init();
loop();

</script>
</body>
